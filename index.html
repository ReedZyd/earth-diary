<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>地球存活日记 · Earth Survival Diary</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{--bg:#0f1115;--panel:#171a21;--line:#262b35;--text:#e8eaed;--muted:#9aa3b2;--green:#34c759;--blue:#3b82f6;--accent:#6ea8fe;--mapbg:#0b0d11;--chipbg:#1b212b;}
  #pokeTip{position:fixed;left:50%;top:60px;transform:translateX(-50%) translateY(-10px);background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.28);z-index:1500;opacity:0;pointer-events:none;transition:opacity .4s ease,transform .4s ease;max-width:90vw;text-align:center;}
  #pokeTip.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;cursor:pointer;}
  body.day{--bg:#f4f6f9;--panel:#ffffff;--line:#dde1e7;--text:#1b1f27;--muted:#5c6470;--mapbg:#e6eaef;--chipbg:#eef1f5;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}
  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0;font-weight:650}
  .stats{font-size:13px;color:var(--muted)} .stats b{color:var(--text)}
  .spacer{flex:1}
  .btn{background:transparent;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .hint{font-size:12px;color:var(--muted);padding:6px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  #main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-height:0;background:var(--mapbg);position:relative}
  #ageCounter{position:absolute;top:10px;right:10px;z-index:600;background:rgba(15,17,21,.82);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted)}
  body.day #ageCounter{background:rgba(255,255,255,.9)}
  #ageCounter b{color:var(--text)}
  #tankBar{position:absolute;top:52px;right:10px;z-index:600;width:182px;background:rgba(15,17,21,.82);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--muted)}
  body.day #tankBar{background:rgba(255,255,255,.9)}
  #tankBar .lab{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;gap:6px}
  #tankBar .lab b{color:var(--text)}
  #tankBar .track{height:7px;border-radius:4px;background:rgba(127,127,127,.25);overflow:hidden}
  #tankBar .fill{height:100%;background:linear-gradient(90deg,#34c759,#6ea8fe);border-radius:4px;transition:width .4s}
  #side{width:300px;background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:10px}
  #side h2{font-size:13px;color:var(--muted);margin:6px 4px;font-weight:600}
  .legend{display:flex;gap:6px;flex-wrap:wrap;padding:2px 2px 8px}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--chipbg);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:3px 9px;font-size:12px;cursor:pointer;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.sel{background:var(--accent);color:#0b1020;border-color:var(--accent);font-weight:600}
  .chip .dot{width:9px;height:9px}
  .secthead{display:flex;align-items:center;gap:8px;margin:8px 4px 4px;border-top:1px solid var(--line);padding-top:8px}
  .secthead span{font-size:13px;color:var(--muted);font-weight:600;flex:1}
  .row2{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;border:1px solid transparent}
  .row2:hover{background:rgba(127,127,127,.12);border-color:var(--line)}
  .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .dot.visited{background:var(--green)} .dot.soon{background:#ff9f0a} .dot.planned{background:var(--blue)}
  .row2 .nm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
  .mini{color:var(--muted);font-size:12px;border:1px solid var(--line);background:none;border-radius:6px;padding:2px 6px;cursor:pointer}
  .mini:hover{border-color:var(--accent);color:var(--text)}
  .diveWrap-outer{background:none;border:none}
  .diveWrap{width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:50%;border:3px solid}
  .diveWrap.visited{border-color:var(--green);background:rgba(52,199,89,.30)}
  .diveWrap.soon{border-color:#ff9f0a;background:rgba(255,159,10,.30)}
  .diveWrap.planned{border-color:var(--blue);background:rgba(59,130,246,.30)}
  .leaflet-tooltip.info{background:#10131a;border:1px solid #2a2f3a;color:#e8eaed;font-size:13px;line-height:1.65;box-shadow:0 6px 20px rgba(0,0,0,.5);min-width:160px;max-width:320px;white-space:normal;padding:9px 12px;border-radius:9px}
  .leaflet-tooltip.info b{color:#fff}
  .leaflet-popup-content{font-family:inherit}
  .pop b{font-size:13px}.pop .r{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
  .pop button{font-size:12px;border:1px solid #ccc;border-radius:6px;padding:4px 8px;background:#fff;cursor:pointer}
  @media(max-width:680px){
    #main{flex-direction:column}
    #side{width:100%;max-height:40vh;border-left:none;border-top:1px solid var(--line)}
    header{gap:6px;padding:8px 10px} header h1{font-size:14px}
    #motto{display:block;margin-left:0;font-size:11px} .btn{padding:5px 9px;font-size:12px}
    #tankBar{top:auto;bottom:10px;right:10px;width:160px} #ageCounter{padding:4px 8px;font-size:11px}
  }

  #gbFab{position:fixed;right:16px;bottom:16px;z-index:1200;width:54px;height:54px;border-radius:50%;border:none;background:#6ea8fe;color:#0b1020;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.45)}
  #gbModal{position:fixed;inset:0;z-index:1300;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center}
  #gbModal.show{display:flex}
  #gbCard{width:min(520px,92vw);max-height:86vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;color:var(--text)}
  #gbCard h3{margin:0 0 4px;font-size:17px} #gbCard h4{margin:0 0 8px;font-size:14px}
  #gbCard .sub{color:var(--muted);font-size:12px;margin-bottom:8px}
  .gbsec{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
  #gbCard input,#gbCard textarea,#gbCard select{width:100%;background:var(--chipbg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;margin-bottom:8px;font-family:inherit}
  #gbCard textarea{min-height:60px;resize:vertical}
  .gbbtn{background:#6ea8fe;color:#0b1020;border:none;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .gbclose{float:right;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
  #gbList .gbi{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:13px}
  #gbList .gbi .who{color:var(--accent);font-weight:600} #gbList .gbi .t{color:var(--muted);font-size:11px;float:right}
  #fw{position:fixed;inset:0;z-index:1400;pointer-events:none;display:none}
</style>
</head>

const ZT=5;
const map=L.map('map',{worldCopyJump:true}).setView([25,30],2);
let tileLayer=null, theme='day';
function setTheme(t){
  theme=t;document.body.classList.toggle('day',t==='day');
  if(tileLayer){map.removeLayer(tileLayer);tileLayer=null;}
  tileLayer=L.tileLayer(t==='day'?'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png':'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,crossOrigin:true,attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  tileLayer.bringToBack();
  const b=document.getElementById('themeBtn');if(b)b.textContent=(t==='day'?'🌙':'☀️');
}
setTheme('day');

let geoLayer=null;
fetch('https://cdn.jsdelivr.net/gh/johan/world.geo.json@master/countries.geo.json').then(r=>r.json()).then(gj=>{
  geoLayer=L.geoJSON(gj,{interactive:false,style:f=>{
    const on=data.some(c=>c.status==='visited'&&c.geo===f.properties.name);
    return on?{fillColor:'#f2e7a8',fillOpacity:.5,color:'#f2e7a8',weight:1,opacity:.5}:{fillOpacity:0,opacity:0,weight:0};
  }}).addTo(map);geoLayer.bringToBack();updateGeo();
}).catch(()=>{});
function updateGeo(){if(!geoLayer)return;if(map.getZoom()<ZT){if(!map.hasLayer(geoLayer)){geoLayer.addTo(map);geoLayer.bringToBack();}}else if(map.hasLayer(geoLayer)){map.removeLayer(geoLayer);}}

let markers={}, curKey=null;
function clearMarkers(){Object.values(markers).forEach(m=>map.removeLayer(m));markers={};}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function shortName(s){return (s||'').replace(/\s*[（(].*$/,'').replace(/\s*·.*$/,'').trim();}
function cName(c){return esc(lang==='cn'?(c.cn||c.name):c.name);}
function cityDisp(ci){return esc(lang==='cn'?(ci.cn||ci.name):ci.name);}
function cityShort(ci){return esc(shortName(lang==='cn'?(ci.cn||ci.name):ci.name));}
function stLabel(s){return s==='visited'?TR('visited'):(s==='soon'?TR('soon'):TR('wishlist'));}
function catOf(o){return o.dive?'🤿':(o.act?o.act:o.status);}
function tankInfo(){const ds=data.filter(c=>c.tanks).slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));let run=0;const m={};ds.forEach(c=>{run+=c.tanks;m[c.id]={trip:c.tanks,cum:run};});return {m,total:run};}
let TANKS={m:{},total:0};
function peopleMatch(o){return peopleSel.size===0 || (o.who && o.who.some(p=>peopleSel.has(p)));}
function countryHasMatch(c){
  if(catSel.size===0) return peopleMatch(c);
  if(catSel.has(catOf(c))&&peopleMatch(c)) return true;
  return (c.cities||[]).some(ci=>catSel.has(catOf(ci))&&(peopleMatch(ci)||peopleMatch(c)));
}
function emojiIcon(emoji,status){return L.divIcon({className:'diveWrap-outer',html:`<div class="diveWrap ${status||'planned'}">${emoji}</div>`,iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-14]});}
function mkLayer(o){
  if(o.dive) return L.marker([o.lat,o.lng],{icon:emojiIcon('🤿',o.status)});
  if(o.act)  return L.marker([o.lat,o.lng],{icon:emojiIcon(o.act,o.status)});
  return L.circleMarker([o.lat,o.lng],{radius:8,color:'#0b0d11',weight:1.5,fillColor:(o.status==='visited'?'#34c759':o.status==='soon'?'#ff9f0a':'#3b82f6'),fillOpacity:.95});
}
function tip(o,isCountry){
  const flag=isCountry&&o.flag?o.flag+' ':'';
  let h='<b>'+flag+(o.dive?'🤿 ':(o.act?o.act+' ':''))+(isCountry?cName(o):cityDisp(o))+'</b><br>'+stLabel(o.status);
  if(o.date)h+=' · 🗓 '+esc(o.date);
  if(isCountry&&o.cities&&o.cities.length)h+='<br><b>'+TR('places')+':</b> '+o.cities.map(ci=>cityShort(ci)).join(lang==='cn'?'、':', ');
  if(o.big)h+='<br><b>'+(o.dive?TR('big'):TR('high'))+':</b> '+esc(o.big);
  if(o.season)h+='<br><b>'+TR('season')+':</b> '+esc(o.season);
  if(o.who&&o.who.length)h+='<br><b>'+TR('withw')+':</b> '+o.who.map(esc).join('、');
  if(isCountry&&o.tanks&&TANKS.m[o.id])h+='<br><b>'+TR('tanks')+':</b> '+TR('tankf')(TANKS.m[o.id].trip,TANKS.m[o.id].cum);
  if(isCountry&&o.tag)h+='<br><b>'+TR('note')+':</b> '+esc(o.tag);
  return h;
}
function infoLines(o){let s='';if(o.big)s+='<br><b>'+(o.dive?TR('big'):TR('high'))+':</b> '+esc(o.big);if(o.season)s+='<br><b>'+TR('season')+':</b> '+esc(o.season);if(o.who&&o.who.length)s+='<br><b>'+TR('withw')+':</b> '+o.who.map(esc).join('、');return s;}
function popupHtml(c,ci){return `<div class="pop"><b>${ci.dive?'🤿 ':(ci.act?ci.act+' ':'')}${cityDisp(ci)}</b><br><span style="color:#888;font-size:12px">${stLabel(ci.status)}${ci.date?' · '+esc(ci.date):''}</span>${infoLines(ci)}<div class="r"><button onclick="toggleCity('${c.id}','${ci.id}')">⇄</button><button onclick="dateCity('${c.id}','${ci.id}')">🗓</button><button onclick="renameCity('${c.id}','${ci.id}')">✎</button><button onclick="delCity('${c.id}','${ci.id}')">✕</button></div></div>`;}
function countryPopupHtml(c){return '<div class="pop">'+tip(c,true)+'<div class="r"><button onclick="goCountry(\''+c.id+'\')">📍 '+(lang==='cn'?'看城市':'Cities')+'</button></div></div>';}
window.goCountry=function(id){const c=data.find(x=>x.id===id);if(c){map.closePopup();map.flyTo([c.lat,c.lng],Math.max(ZT,6),{duration:.6});}};

function nearestCountry(){
  const ctr=map.getCenter();let best=null,bd=1e9;
  data.filter(peopleMatch).forEach(c=>{const dy=c.lat-ctr.lat,dx=(c.lng-ctr.lng)*Math.cos(ctr.lat*Math.PI/180);const d=dy*dy+dx*dx;if(d<bd){bd=d;best=c;}});
  return best;
}
function render(force){
  TANKS=tankInfo();
  updateGeo();
  if(catSel.size>0){
    if(curKey==='__f__'&&!force)return;
    curKey='__f__';clearMarkers();
    const pts=[];
    data.forEach(c=>{
      if(catSel.has(catOf(c))&&peopleMatch(c)){
        const m=mkLayer(c).addTo(map);
        m.bindTooltip(tip(c,true),{sticky:true,direction:'top',className:'info'});
        m.bindPopup(countryPopupHtml(c));
        markers[c.id]=m;pts.push([c.lat,c.lng]);
      }
      (c.cities||[]).forEach(ci=>{
        if(catSel.has(catOf(ci))&&(peopleMatch(ci)||peopleMatch(c))){
          const m=mkLayer(ci).addTo(map);
          m.bindTooltip(tip(ci,false),{sticky:true,direction:'top',className:'info'});
          m.bindPopup(popupHtml(c,ci));
          markers[ci.id]=m;pts.push([ci.lat,ci.lng]);
        }
      });
    });
    document.getElementById('hint').innerHTML=TR('filtered');
    if(force&&pts.length)map.fitBounds(pts,{padding:[60,60],maxZoom:6});
    renderStats();return;
  }
  const z=map.getZoom();
  if(z<ZT){
    if(curKey==='__c__'&&!force)return;
    curKey='__c__';clearMarkers();
    data.filter(peopleMatch).forEach(c=>{
      const m=mkLayer(c).addTo(map);
      m.bindTooltip(tip(c,true),{sticky:true,direction:'top',className:'info'});
      m.bindPopup(countryPopupHtml(c));
      markers[c.id]=m;
    });
    document.getElementById('hint').innerHTML=TR('hintC');
  }else{
    const c=nearestCountry();const k=c?c.id:'__none__';
    if(curKey===k&&!force)return;
    curKey=k;clearMarkers();
    if(c)(c.cities||[]).filter(peopleMatch).forEach(ci=>{
      const m=mkLayer(ci).addTo(map);
      m.bindTooltip(tip(ci,false),{sticky:true,direction:'top',className:'info'});
      m.bindPopup(popupHtml(c,ci));
      markers[ci.id]=m;
    });
    document.getElementById('hint').innerHTML=c?('<b>'+(c.flag?c.flag+' ':'')+cName(c)+'</b>'+TR('backInfo')+((c.cities&&c.cities.length)?'':' '+TR('cityTodo'))):TR('hintC');
  }
  renderStats();
}
function renderSide(){
  document.getElementById('sideHead').innerHTML='<h2>'+TR('countries')+'</h2>';
  const el=document.getElementById('list');el.innerHTML='';
  data.filter(countryHasMatch).slice().sort((a,b)=>(a.status>b.status?1:-1)||a.name.localeCompare(b.name)).forEach(c=>{
    const d=document.createElement('div');d.className='row2';
    const dot=c.dive?'🤿':`<i class="dot ${c.status}"></i>`;
    d.innerHTML=`${dot}<span class="nm">${(c.flag?c.flag+' ':'')+cName(c)}</span>${c.date?'<span style="color:#9aa3b2;font-size:11px;margin-right:4px">'+esc(c.date)+'</span>':''}<button class="mini" title="toggle">⇄</button>`;
    d.querySelector('.nm').onclick=()=>map.flyTo([c.lat,c.lng],Math.max(ZT,6),{duration:.6});
    d.querySelector('.mini').onclick=(e)=>{e.stopPropagation();c.status=c.status==='visited'?'soon':(c.status==='soon'?'planned':'visited');save();render(true);renderSide();};
    el.appendChild(d);
  });
}
window.toggleCity=function(cid,ciid){const c=data.find(x=>x.id===cid);const ci=c&&c.cities.find(y=>y.id===ciid);if(!ci)return;ci.status=ci.status==='visited'?'soon':(ci.status==='soon'?'planned':'visited');save();render(true);};
window.renameCity=function(cid,ciid){const c=data.find(x=>x.id===cid);const ci=c&&c.cities.find(y=>y.id===ciid);if(!ci)return;const n=prompt('Name:',ci.name);if(n!==null&&n.trim()){ci.name=n.trim();save();render(true);}};
window.delCity=function(cid,ciid){const c=data.find(x=>x.id===cid);if(!c)return;c.cities=c.cities.filter(y=>y.id!==ciid);save();render(true);};
window.dateCity=function(cid,ciid){const c=data.find(x=>x.id===cid);const ci=c&&c.cities.find(y=>y.id===ciid);if(!ci)return;const d=prompt('Time (e.g. 2026.05):',ci.date||'');if(d!==null){ci.date=d.trim();save();render(true);}};

function renderStats(){
  const v=data.filter(c=>c.status==='visited').length,s=data.filter(c=>c.status==='soon').length,p=data.filter(c=>c.status==='planned').length,dv=data.filter(c=>c.dive).length;
  document.getElementById('stats').innerHTML=TR('statsfmt')(v,s,p,dv,TANKS.total);
  updateTankBar();
}
function peopleCounts(){const m={};data.forEach(c=>{const set=new Set([...(c.who||[])]);(c.cities||[]).forEach(ci=>(ci.who||[]).forEach(p=>set.add(p)));set.forEach(p=>m[p]=(m[p]||0)+1);});return m;}
function renderPeople(){
  const box=document.getElementById('people');box.innerHTML='';
  const cnt=peopleCounts();
  Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]||a.localeCompare(b)).forEach(p=>{
    const b=document.createElement('button');b.className='chip'+(peopleSel.has(p)?' sel':'');b.textContent=p+' '+cnt[p];
    b.onclick=()=>{if(peopleSel.has(p))peopleSel.delete(p);else peopleSel.add(p);b.classList.toggle('sel',peopleSel.has(p));render(true);renderSide();};
    box.appendChild(b);
  });
}
const BD=new Date(1998,4,19);
function updateAge(){
  const now=new Date();let y=now.getFullYear()-1998,m=now.getMonth()-4,d=now.getDate()-19;
  if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
  if(m<0){y--;m+=12;}
  const el=document.getElementById('ageCounter');if(el)el.innerHTML=TR('agefmt')(y,m,d);
}
function updateTankBar(){
  const el=document.getElementById('tankBar');if(!el)return;
  const t=(TANKS&&TANKS.total)||0;const h=Math.floor(t/100);const within=t-h*100;const next=(h+1)*100;
  const cap=(lang==='cn'?'🤿 百瓶进度':'🤿 Toward 100')+(h>0?' 🎉×'+h:'');
  el.innerHTML='<div class="lab"><span>'+cap+'</span><b>'+t+' / '+next+'</b></div><div class="track"><div class="fill" style="width:'+within+'%"></div></div>';
}

function applyLang(){
  document.getElementById('titleTxt').textContent=TR('title');
  const mo=document.getElementById('motto');if(mo)mo.textContent=TR('motto')?'— '+TR('motto'):'';
  document.getElementById('worldBtn').textContent=TR('world');
  document.getElementById('chinaBtn').textContent=TR('china');
  document.getElementById('langBtn').textContent=TR('lang');
  document.getElementById('exportBtn').textContent=TR('exp');
  document.getElementById('importBtn').textContent=TR('imp');
  document.getElementById('shotBtn').textContent=TR('shot');
  document.getElementById('pplHead').textContent=TR('ppl');
  document.getElementById('peopleAll').textContent=TR('showall');
  const pt=document.getElementById('peopleToggle');pt.textContent=(document.getElementById('people').style.display==='none')?TR('show'):TR('hide');
  const lab={visited:'<i class="dot visited"></i>'+TR('visited'),soon:'<i class="dot soon"></i>'+TR('soon'),planned:'<i class="dot planned"></i>'+TR('wishlist'),'🤿':'🤿 '+TR('diving'),'🪂':'🪂 '+TR('skydiving'),'🐴':'🐴 '+TR('horse'),'🌌':'🌌 '+TR('aurora'),'🌠':'🌠 '+TR('meteor'),'🔭':'🔭 '+TR('stargazing')};
  document.querySelectorAll('#legend .chip').forEach(ch=>{ch.innerHTML=lab[ch.dataset.cat]||ch.dataset.cat;ch.classList.toggle('sel',catSel.has(ch.dataset.cat));});
  updateAge();renderPeople();renderSide();render(true);
}

let hoverTimer=null,hoverPop=null,lastLL=null;
map.on('mousemove',e=>{if(window.matchMedia&&window.matchMedia('(pointer:coarse)').matches)return;lastLL=e.latlng;if(hoverTimer)clearTimeout(hoverTimer);hoverTimer=setTimeout(showHoverName,1000);});
map.on('mouseout',()=>{if(hoverTimer)clearTimeout(hoverTimer);if(hoverPop){map.closePopup(hoverPop);hoverPop=null;}});
map.on('click',e=>{lastLL=e.latlng;if(hoverPop){map.closePopup(hoverPop);hoverPop=null;}showHoverName();});
map.on('movestart zoomstart',()=>{if(hoverTimer)clearTimeout(hoverTimer);if(hoverPop){map.closePopup(hoverPop);hoverPop=null;}});
function showHoverName(){
  if(!lastLL)return;const ll=lastLL;
  const cp=map.latLngToContainerPoint(ll);
  for(const id in markers){const ml=markers[id];if(ml&&ml.getLatLng){const p=map.latLngToContainerPoint(ml.getLatLng());if(Math.hypot(p.x-cp.x,p.y-cp.y)<26)return;}}
  const z=Math.min(10,Math.max(3,Math.round(map.getZoom())));
  fetch('https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat='+ll.lat+'&lon='+ll.lng+'&zoom='+z+'&accept-language='+(lang==='cn'?'zh':'en')).then(r=>r.json()).then(j=>{
    const nm=j&&(j.name||j.display_name);if(!nm)return;
    if(hoverPop)map.closePopup(hoverPop);
    hoverPop=L.popup({closeButton:false,autoClose:false,closeOnClick:false}).setLatLng(ll).setContent('<span style="font-size:12px">'+nm.split(',').slice(0,2).join(', ')+'</span>').openOn(map);
  }).catch(()=>{});
}

document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=ev=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){data=d;save();applyLang();}}catch(e){alert('Bad file format');}};r.readAsText(f);};
document.getElementById('shotBtn').onclick=function(){
  const btn=this,orig=btn.textContent;btn.textContent='⏳';
  const go=()=>{
    const bg=getComputedStyle(document.body).getPropertyValue('--bg').trim()||'#0f1115';
    window.html2canvas(document.getElementById('app'),{useCORS:true,backgroundColor:bg,logging:false,scale:2}).then(cv=>{
      cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='travel-map-'+Date.now()+'.png';a.click();btn.textContent=orig;});
    }).catch(e=>{btn.textContent=orig;alert((lang==='cn'?'截图失败：':'Screenshot failed: ')+e);});
  };
  if(window.html2canvas){go();return;}
  const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
  s.onload=go;s.onerror=()=>{btn.textContent=orig;alert(lang==='cn'?'截图库未能加载（需要联网）':'Screenshot library failed to load (needs internet)');};
  document.head.appendChild(s);
};
